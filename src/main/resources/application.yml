spring:
  threads:
    virtual:
      enabled: true
  ai:
    ollama:
      base-url: ${OLLAMA_URL:http://localhost:11434}
      chat:
        options:
          model: llama3.2:1b
      init:
        pull-model-strategy: when_missing
        timeout: 5m
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info